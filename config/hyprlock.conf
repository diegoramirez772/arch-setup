# hyprlock — pantalla de bloqueo
# Copiado a ~/.config/hypr/hyprlock.conf por 3-caelestia-setup.sh

general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 3
}

background {
    path = ~/Pictures/Wallpapers
    blur_passes = 3
    blur_size = 7
    brightness = 0.5
}

# Hora grande al centro
label {
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(255, 255, 255, 0.95)
    font_size = 72
    font_family = Caskaydia Cove Nerd Font
    position = 0, 120
    halign = center
    valign = center
}

# Fecha debajo de la hora
label {
    text = cmd[update:60000] echo "$(date +'%A, %d de %B')"
    color = rgba(255, 255, 255, 0.6)
    font_size = 18
    font_family = Caskaydia Cove Nerd Font
    position = 0, 50
    halign = center
    valign = center
}

# Campo de contraseña
input-field {
    size = 280, 48
    position = 0, -80
    halign = center
    valign = center
    placeholder_text = <i>contraseña</i>
    dots_center = true
    fade_on_empty = true
    font_color = rgba(255, 255, 255, 0.9)
    inner_color = rgba(0, 0, 0, 0.4)
    outer_color = rgba(255, 255, 255, 0.2)
    check_color = rgba(100, 220, 150, 0.9)
    fail_color = rgba(220, 80, 80, 0.9)
    fail_text = incorrecto
    capslock_color = rgba(220, 180, 80, 0.9)
}
