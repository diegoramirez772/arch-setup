# Keybindings — IdeaPad 330 + Hyprland
# Sourced desde hyprland.conf por 3-caelestia-setup.sh

# ─── Apps principales ─────────────────────────────────────────────────────────
bind = SUPER, T, exec, foot
bind = SUPER, E, exec, thunar
bind = SUPER, B, exec, google-chrome-stable
bind = SUPER, L, exec, hyprlock

# ─── Screenshots ──────────────────────────────────────────────────────────────
# PrtSc = captura pantalla completa y guarda
bind = , Print, exec, grim ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png && notify-send "Screenshot guardado"
# Super+PrtSc = seleccionar zona y abrir en swappy para anotar
bind = SUPER, Print, exec, slurp | grim -g - - | swappy -f -
# Super+Shift+S = copiar zona al clipboard directamente
bind = SUPER SHIFT, S, exec, slurp | grim -g - - | wl-copy

# ─── Volumen ──────────────────────────────────────────────────────────────────
bind = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = , XF86AudioMute,        exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bind = , XF86AudioMicMute,     exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle

# ─── Brillo ───────────────────────────────────────────────────────────────────
bind = , XF86MonBrightnessUp,   exec, brightnessctl set +10%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

# ─── Clipboard history ────────────────────────────────────────────────────────
bind = SUPER, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# ─── Sesión (apagar, reiniciar, suspender, cerrar sesión) ─────────────────────
bind = SUPER SHIFT, E, exec, wlogout

# ─── Keyboard layout ──────────────────────────────────────────────────────────
input {
    kb_layout = latam
    kb_options = grp:alt_shift_toggle
    numlock_by_default = false
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = true
        tap-and-drag = true
    }
}

# ─── Gestos del touchpad ──────────────────────────────────────────────────────
gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 300
    workspace_swipe_invert = false
    workspace_swipe_min_speed_to_force = 30
    workspace_swipe_cancel_ratio = 0.5
    workspace_swipe_create_new = true
    workspace_swipe_forever = false
}
